<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Time</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="settings">
            <div class="custom-select-wrapper" data-select-id="wage-type">
                <div class="custom-select">
                  <div class="custom-select-trigger">Hourly Wage</div>
                  <div class="custom-options">
                    <span class="custom-option" data-value="hourly">Hourly Wage</span>
                    <span class="custom-option" data-value="monthly">Monthly Wage</span>
                    </div>
                </div>
            </div><div class="custom-select-wrapper" data-select-id="currency">
                <div class="custom-select">
                  <div class="custom-select-trigger">USD</div>
                    <div class="custom-options">
                    <span class="custom-option" data-value="USD">USD</span>
                    <span class="custom-option" data-value="EUR">EUR</span>
                    <span class="custom-option" data-value="GBP">GBP</span>
                    <span class="custom-option" data-value="SEK">SEK</span>
                    </div>
                </div>
            </div>
        </div>
    
        <div id="clock">
            <span id="whole-part">000</span>.<span id="decimal-part">000</span> 
            <span id="currency-symbol">$</span>
        </div>

        <div class="inputs">
            <div class="input-group">
                <input type="number" id="wage" placeholder="Enter your wage..." oninput="updateWage()">
            </div>


            <div class="buttons">
                <button id="toggle-button" onclick="toggleClock()">Start</button>
                <button id="restart-button" hidden="true" onclick="restartClock()">Restart</button>
            </div>
        </div>
                


    <script src="script.js"></script>
</body>
</html>
